<div class="container mt-4">
  <section class="mb-5">
    <h2 class="mb-4">Catálogo de Monedas</h2>
    <div class="row">
      @for (m of monedas; track m.nombre) {
        <div class="col-md-4 mb-4">
          <app-card-moneda [moneda]="m" (agregar)="guardarMoneda($event)"></app-card-moneda>
        </div>
      }
    </div>
  </section>
</div>
