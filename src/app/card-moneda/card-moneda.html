@if (moneda) {
  <div class="card" style="width: 18rem;">
    <img [src]="moneda.imagenUrl" class="card-img-top" alt="Anverso">
  <div class="card-body">
    <ul class="list-group list-group-flush">
      <li class="list-group-item"><strong>País:</strong> {{moneda.pais}}</li>
      <li class="list-group-item"><strong>Emisor:</strong> {{moneda.emisor}}</li>
      <li class="list-group-item"><strong>Época:</strong> {{moneda.epoca}}</li>
      <li class="list-group-item"><strong>Peso:</strong> {{moneda.peso}}</li>
      <li class="list-group-item"><strong>Conservacion:</strong> {{moneda.conservacion}}</li>
            <li class="list-group-item"><strong>Precio:</strong> ${{moneda.precio | number:'1.2-2'}}</li>

      </ul>
  </div>
</div>}
